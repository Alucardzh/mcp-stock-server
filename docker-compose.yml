services:
  mcp-stock:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-stock-server:latest
    container_name: mcp-stock
    ports:
      - "18881:8000"
    environment:
      - TZ=Asia/Shanghai
      - MCP_TRANSPORT=http
      - MCP_PORT=8000
    restart: unless-stopped
    networks:
      - database_dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  database_dev-network:
    external: true
